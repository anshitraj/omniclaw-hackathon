kind = "web"
previewPath = "/"
title = "OmniClaw — Agent Commerce Console"
version = "1.0.0"
id = "artifacts/omniclaw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19566

[services.development]
run = "pnpm --filter @workspace/omniclaw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniclaw", "run", "build" ]
publicDir = "artifacts/omniclaw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19566"
BASE_PATH = "/"
